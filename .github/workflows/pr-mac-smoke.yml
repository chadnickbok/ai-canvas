name: macOS Packaging Smoke

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: mac-smoke-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mac-smoke:
    name: macOS Smoke Build
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 45

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned macOS artifacts
        run: pnpm dist:mac:unsigned

      - name: Verify macOS update metadata
        run: |
          UPDATE_METADATA_PATHS=()
          while IFS= read -r UPDATE_METADATA_PATH; do
            UPDATE_METADATA_PATHS+=("$UPDATE_METADATA_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name 'latest-mac*.yml' -type f | sort)

          if [ "${#UPDATE_METADATA_PATHS[@]}" -eq 0 ]; then
            echo "macOS update metadata was not generated." >&2
            exit 1
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-artifacts
          path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error
