name: Build Candidate

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  package-macos:
    runs-on: macos-latest
    environment: release-candidate
    env:
      AI_CANVAS_GITHUB_OWNER: ${{ github.repository_owner }}
      AI_CANVAS_GITHUB_REPO: ${{ github.event.repository.name }}
      AI_CANVAS_RELEASE_CHANNEL: latest
      AI_CANVAS_UPDATE_BASE_URL: ${{ vars.AI_CANVAS_UPDATE_BASE_URL }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_LINK: ${{ secrets.CSC_LINK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve build metadata
        run: echo "AI_CANVAS_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Validate release environment
        run: |
          required_vars=(
            AI_CANVAS_UPDATE_BASE_URL
            CSC_LINK
            CSC_KEY_PASSWORD
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required release environment value: ${name}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Desktop tests
        run: pnpm --filter @ai-canvas/desktop test

      - name: Build desktop output
        run: pnpm build:desktop

      - name: Package macOS candidate
        run: pnpm --filter @ai-canvas/desktop dist:mac

      - name: Generate candidate checksums
        env:
          ARTIFACT_DIR: apps/desktop/dist/release
        run: |
          find "$ARTIFACT_DIR" -maxdepth 1 -type f | sort | while read -r file; do
            shasum -a 256 "$file"
          done > "$ARTIFACT_DIR/SHA256SUMS.txt"

      - name: Generate candidate manifest
        env:
          ARTIFACT_DIR: apps/desktop/dist/release
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, readdirSync, statSync, writeFileSync } from "node:fs";
          import path from "node:path";

          const artifactDir = process.env.ARTIFACT_DIR;
          if (!artifactDir) {
            throw new Error("ARTIFACT_DIR is required");
          }

          const desktopPackage = JSON.parse(
            readFileSync(path.join(process.cwd(), "apps/desktop/package.json"), "utf8")
          );
          const files = readdirSync(artifactDir)
            .filter((name) => statSync(path.join(artifactDir, name)).isFile())
            .sort();
          const manifest = {
            artifacts: files,
            channel: process.env.AI_CANVAS_RELEASE_CHANNEL ?? "latest",
            commitSha: process.env.AI_CANVAS_COMMIT_SHA ?? null,
            version: desktopPackage.version ?? null,
            workflowRunId: process.env.GITHUB_RUN_ID ?? null
          };

          writeFileSync(
            path.join(artifactDir, "candidate-manifest.json"),
            `${JSON.stringify(manifest, null, 2)}\n`
          );
          NODE

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-canvas-desktop-macos-candidate-${{ github.run_id }}
          path: apps/desktop/dist/release/*
          if-no-files-found: error
