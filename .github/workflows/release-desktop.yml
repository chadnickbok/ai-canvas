name: Release Desktop

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-desktop-main
  cancel-in-progress: false

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  release-meta:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_title: ${{ steps.version.outputs.release_title }}

    steps:
      - name: Compute main release version
        id: version
        run: |
          APP_VERSION=$(node <<'NODE'
          const now = new Date();
          const year = now.getUTCFullYear();
          const monthDay = `${now.getUTCMonth() + 1}${String(now.getUTCDate()).padStart(2, '0')}`;
          process.stdout.write(`${year}.${monthDay}.${process.env.GITHUB_RUN_NUMBER}`);
          NODE
          )
          RELEASE_TAG="v${APP_VERSION}"
          RELEASE_TITLE="AI Canvas ${APP_VERSION}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

  windows-signing-ready:
    name: Windows Signing Readiness
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
      - name: Check Windows signing configuration
        id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          WINDOWS_AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          WINDOWS_AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_ENDPOINT }}
          WINDOWS_AZURE_TRUSTED_SIGNING_PROFILE_NAME: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_PROFILE_NAME }}
          WINDOWS_SIGN_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGN_PUBLISHER_NAME }}
        run: |
          missing=0

          for var_name in \
            AZURE_TENANT_ID \
            AZURE_CLIENT_ID \
            AZURE_CLIENT_SECRET \
            WINDOWS_AZURE_TRUSTED_SIGNING_ENDPOINT \
            WINDOWS_AZURE_TRUSTED_SIGNING_ACCOUNT_NAME \
            WINDOWS_AZURE_TRUSTED_SIGNING_PROFILE_NAME \
            WINDOWS_SIGN_PUBLISHER_NAME
          do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing Windows signing input: ${var_name}"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  release-macos:
    name: Signed macOS Release
    runs-on: macos-latest
    environment: release
    needs:
      - quality
      - test
      - release-meta
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install signing certificate
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          decode_base64_to_file() {
            local input="$1"
            local output="$2"
            local temp_path="${output}.tmp"

            rm -f "$temp_path"

            if printf '%s' "$input" | base64 --decode > "$temp_path" 2>/dev/null; then
              mv "$temp_path" "$output"
              return 0
            fi

            printf '%s' "$input" | base64 -D > "$temp_path"
            mv "$temp_path" "$output"
          }

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          decode_base64_to_file "$BUILD_CERTIFICATE_BASE64" "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          DMG_SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ {print $2; exit}')
          if [ -z "$DMG_SIGN_IDENTITY" ]; then
            echo "No Developer ID Application identity found in temporary keychain." >&2
            exit 1
          fi

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_sign_identity=$DMG_SIGN_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          decode_base64_to_file() {
            local input="$1"
            local output="$2"
            local temp_path="${output}.tmp"

            rm -f "$temp_path"

            if printf '%s' "$input" | base64 --decode > "$temp_path" 2>/dev/null; then
              mv "$temp_path" "$output"
              return 0
            fi

            printf '%s' "$input" | base64 -D > "$temp_path"
            mv "$temp_path" "$output"
          }

          decode_base64_to_file "$APPLE_API_KEY_P8_BASE64" "$RUNNER_TEMP/AuthKey.p8"

      - name: Build signed and notarized macOS artifacts
        env:
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEYCHAIN: ${{ steps.signing.outputs.keychain_path }}
          DESKTOP_RELEASE_VERSION: ${{ needs.release-meta.outputs.app_version }}
          DESKTOP_BUILD_VERSION: ${{ github.run_number }}
        run: |
          pnpm dist:mac

      - name: Sign, notarize, and staple DMGs
        env:
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEYCHAIN: ${{ steps.signing.outputs.keychain_path }}
          DMG_SIGN_IDENTITY: ${{ steps.signing.outputs.dmg_sign_identity }}
        run: |
          set -euo pipefail

          DMG_PATHS=()
          while IFS= read -r DMG_PATH; do
            DMG_PATHS+=("$DMG_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name '*.dmg' -type f | sort)

          if [ "${#DMG_PATHS[@]}" -eq 0 ]; then
            echo "Signed DMGs not found." >&2
            exit 1
          fi

          for DMG_PATH in "${DMG_PATHS[@]}"; do
            codesign --force --sign "$DMG_SIGN_IDENTITY" --keychain "$CSC_KEYCHAIN" --timestamp "$DMG_PATH"
            codesign --verify --verbose=2 "$DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" \
              --wait \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER"
            xcrun stapler staple "$DMG_PATH"
            xcrun stapler validate "$DMG_PATH"
          done

      - name: Verify code signing and notarization
        run: |
          APP_PATHS=()
          while IFS= read -r APP_PATH; do
            APP_PATHS+=("$APP_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 2 -name '*.app' -type d | sort)

          DMG_PATHS=()
          while IFS= read -r DMG_PATH; do
            DMG_PATHS+=("$DMG_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name '*.dmg' -type f | sort)

          UPDATE_METADATA_PATHS=()
          while IFS= read -r UPDATE_METADATA_PATH; do
            UPDATE_METADATA_PATHS+=("$UPDATE_METADATA_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name 'latest-mac*.yml' -type f | sort)

          if [ "${#APP_PATHS[@]}" -eq 0 ]; then
            echo "Signed app bundles not found." >&2
            exit 1
          fi

          if [ "${#DMG_PATHS[@]}" -eq 0 ]; then
            echo "Signed DMGs not found." >&2
            exit 1
          fi

          if [ "${#UPDATE_METADATA_PATHS[@]}" -eq 0 ]; then
            echo "macOS update metadata not found." >&2
            exit 1
          fi

          for APP_PATH in "${APP_PATHS[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            spctl -a -vvv --type exec "$APP_PATH"
            xcrun stapler validate "$APP_PATH"
          done

          for DMG_PATH in "${DMG_PATHS[@]}"; do
            codesign --verify --verbose=2 "$DMG_PATH"
            hdiutil verify "$DMG_PATH"
            spctl -a -t open --context context:primary-signature -vvv "$DMG_PATH"
            xcrun stapler validate "$DMG_PATH"
          done

      - name: Upload macOS release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error

  release-linux:
    name: Linux Release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - quality
      - test
      - release-meta
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux artifacts
        env:
          DESKTOP_RELEASE_VERSION: ${{ needs.release-meta.outputs.app_version }}
          DESKTOP_BUILD_VERSION: ${{ github.run_number }}
        run: pnpm dist:linux:${{ matrix.arch }}

      - name: Verify Linux artifacts
        run: |
          DEB_PATHS=()
          while IFS= read -r DEB_PATH; do
            DEB_PATHS+=("$DEB_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name '*.deb' -type f | sort)

          APPIMAGE_PATHS=()
          while IFS= read -r APPIMAGE_PATH; do
            APPIMAGE_PATHS+=("$APPIMAGE_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name '*.AppImage' -type f | sort)

          UPDATE_METADATA_PATHS=()
          while IFS= read -r UPDATE_METADATA_PATH; do
            UPDATE_METADATA_PATHS+=("$UPDATE_METADATA_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name 'latest-linux*.yml' -type f | sort)

          if [ "${#DEB_PATHS[@]}" -eq 0 ]; then
            echo "Linux .deb artifact was not generated." >&2
            exit 1
          fi

          if [ "${#APPIMAGE_PATHS[@]}" -eq 0 ]; then
            echo "Linux AppImage artifact was not generated." >&2
            exit 1
          fi

          if [ "${#UPDATE_METADATA_PATHS[@]}" -eq 0 ]; then
            echo "Linux update metadata was not generated." >&2
            exit 1
          fi

      - name: Upload Linux release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-artifacts-${{ matrix.arch }}
          path: |
            apps/desktop/dist-electron/*.deb
            apps/desktop/dist-electron/*.AppImage
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error

  release-windows:
    name: Windows Release (x64)
    runs-on: windows-latest
    environment: release
    needs:
      - quality
      - test
      - release-meta
      - windows-signing-ready
    if: ${{ needs.windows-signing-ready.outputs.ready == 'true' }}
    timeout-minutes: 45

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      DESKTOP_BUILD_VERSION: ${{ github.run_number }}
      DESKTOP_RELEASE_VERSION: ${{ needs.release-meta.outputs.app_version }}
      DESKTOP_WINDOWS_SIGN: 'true'
      WINDOWS_AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      WINDOWS_AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_ENDPOINT }}
      WINDOWS_AZURE_TRUSTED_SIGNING_PROFILE_NAME: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_PROFILE_NAME }}
      WINDOWS_AZURE_TRUSTED_SIGNING_TIMESTAMP_RFC3161: ${{ vars.WINDOWS_AZURE_TRUSTED_SIGNING_TIMESTAMP_RFC3161 }}
      WINDOWS_SIGN_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGN_PUBLISHER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build signed Windows artifacts
        run: pnpm dist:win:x64

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $installerPaths = Get-ChildItem apps/desktop/dist-electron -Filter *.exe -File
          $updateMetadataPath = Join-Path $PWD 'apps/desktop/dist-electron/latest.yml'
          $blockmapPaths = Get-ChildItem apps/desktop/dist-electron -Filter *.blockmap -File

          if ($installerPaths.Count -eq 0) {
            throw 'Windows installer artifact was not generated.'
          }

          if (-not (Test-Path $updateMetadataPath)) {
            throw 'Windows update metadata was not generated.'
          }

          if ($blockmapPaths.Count -eq 0) {
            throw 'Windows blockmap artifact was not generated.'
          }

      - name: Verify Windows code signature
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist-electron -Filter *.exe -File | Select-Object -First 1
          $signature = Get-AuthenticodeSignature $installer.FullName

          if ($signature.Status -ne 'Valid') {
            throw "Windows code signing verification failed: $($signature.Status)"
          }

      - name: Upload Windows release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts-x64
          path: |
            apps/desktop/dist-electron/*.exe
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - release-macos
      - release-linux
      - release-windows
    if: ${{ always() && needs.release-meta.result == 'success' && needs.release-macos.result == 'success' && needs.release-linux.result == 'success' && (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped') }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*release-artifacts*'
          merge-multiple: true
          path: apps/desktop/dist-electron

      - name: Verify merged artifact set
        run: |
          RELEASE_ARTIFACT_PATHS=()
          while IFS= read -r RELEASE_ARTIFACT_PATH; do
            RELEASE_ARTIFACT_PATHS+=("$RELEASE_ARTIFACT_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 \( -name '*.dmg' -o -name '*.zip' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.exe' -o -name '*.yml' -o -name '*.blockmap' \) -type f | sort)

          if [ "${#RELEASE_ARTIFACT_PATHS[@]}" -eq 0 ]; then
            echo "Release artifacts were not downloaded." >&2
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          WINDOWS_RELEASE_INCLUDED: ${{ needs.release-windows.result == 'success' }}
        run: |
          set -euo pipefail

          ARTIFACT_PATHS=()
          while IFS= read -r ARTIFACT_PATH; do
            ARTIFACT_PATHS+=("$ARTIFACT_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 \( -name '*.dmg' -o -name '*.zip' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.exe' -o -name '*.yml' -o -name '*.blockmap' \) -type f | sort)

          if [ "${#ARTIFACT_PATHS[@]}" -eq 0 ]; then
            echo "No release artifacts found to publish." >&2
            exit 1
          fi

          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Automated main release from \`${GITHUB_SHA}\`.

          - Version: \`${{ needs.release-meta.outputs.app_version }}\`
          - Commit: \`${GITHUB_SHA}\`
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Linux install notes:
          - Debian/Ubuntu: download the matching \`.deb\` file and install with \`sudo apt install ./AI-Canvas-<version>-<arch>.deb\`
          - Other Linux environments: download the matching \`.AppImage\`, run \`chmod +x\`, then launch it directly
          EOF

          if [ "${WINDOWS_RELEASE_INCLUDED}" = "true" ]; then
            cat >> "$RUNNER_TEMP/release-notes.md" <<EOF

          Windows install notes:
          - Download the \`.exe\` installer and run it normally
          - Installed Windows builds use Electron Updater against this GitHub Release feed
          EOF
          fi

          if gh release view "${{ needs.release-meta.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ needs.release-meta.outputs.release_tag }}" "${ARTIFACT_PATHS[@]}" --clobber
            gh release edit "${{ needs.release-meta.outputs.release_tag }}" \
              --title "${{ needs.release-meta.outputs.release_title }}" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "${{ needs.release-meta.outputs.release_tag }}" \
              "${ARTIFACT_PATHS[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${{ needs.release-meta.outputs.release_title }}" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
