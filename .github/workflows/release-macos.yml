name: Release macOS

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-macos-main
  cancel-in-progress: false

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  release-macos:
    name: Signed macOS Release
    runs-on: macos-latest
    environment: release
    needs:
      - quality
      - test
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute main release version
        id: version
        run: |
          APP_VERSION=$(node <<'NODE'
          const now = new Date();
          const year = now.getUTCFullYear();
          const monthDay = `${now.getUTCMonth() + 1}${String(now.getUTCDate()).padStart(2, '0')}`;
          process.stdout.write(`${year}.${monthDay}.${process.env.GITHUB_RUN_NUMBER}`);
          NODE
          )
          RELEASE_TAG="v${APP_VERSION}"
          RELEASE_TITLE="AI Canvas ${APP_VERSION}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Install signing certificate
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          decode_base64_to_file() {
            local input="$1"
            local output="$2"
            local temp_path="${output}.tmp"

            rm -f "$temp_path"

            if printf '%s' "$input" | base64 --decode > "$temp_path" 2>/dev/null; then
              mv "$temp_path" "$output"
              return 0
            fi

            printf '%s' "$input" | base64 -D > "$temp_path"
            mv "$temp_path" "$output"
          }

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          decode_base64_to_file "$BUILD_CERTIFICATE_BASE64" "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q 'Developer ID Application'; then
            echo "No Developer ID Application identity found in temporary keychain." >&2
            exit 1
          fi

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          decode_base64_to_file() {
            local input="$1"
            local output="$2"
            local temp_path="${output}.tmp"

            rm -f "$temp_path"

            if printf '%s' "$input" | base64 --decode > "$temp_path" 2>/dev/null; then
              mv "$temp_path" "$output"
              return 0
            fi

            printf '%s' "$input" | base64 -D > "$temp_path"
            mv "$temp_path" "$output"
          }

          decode_base64_to_file "$APPLE_API_KEY_P8_BASE64" "$RUNNER_TEMP/AuthKey.p8"

      - name: Build signed and notarized macOS artifacts
        env:
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEYCHAIN: ${{ steps.signing.outputs.keychain_path }}
          DESKTOP_RELEASE_VERSION: ${{ steps.version.outputs.app_version }}
          DESKTOP_BUILD_VERSION: ${{ github.run_number }}
        run: |
          pnpm dist:mac

      - name: Verify code signing and notarization
        run: |
          APP_PATHS=()
          while IFS= read -r APP_PATH; do
            APP_PATHS+=("$APP_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 2 -name '*.app' -type d | sort)

          DMG_PATHS=()
          while IFS= read -r DMG_PATH; do
            DMG_PATHS+=("$DMG_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name '*.dmg' -type f | sort)

          UPDATE_METADATA_PATHS=()
          while IFS= read -r UPDATE_METADATA_PATH; do
            UPDATE_METADATA_PATHS+=("$UPDATE_METADATA_PATH")
          done < <(find apps/desktop/dist-electron -maxdepth 1 -name 'latest-mac*.yml' -type f | sort)

          if [ "${#APP_PATHS[@]}" -eq 0 ]; then
            echo "Signed app bundles not found." >&2
            exit 1
          fi

          if [ "${#DMG_PATHS[@]}" -eq 0 ]; then
            echo "Signed DMGs not found." >&2
            exit 1
          fi

          if [ "${#UPDATE_METADATA_PATHS[@]}" -eq 0 ]; then
            echo "macOS update metadata not found." >&2
            exit 1
          fi

          for APP_PATH in "${APP_PATHS[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            spctl -a -vvv --type exec "$APP_PATH"
            xcrun stapler validate "$APP_PATH"
          done

          for DMG_PATH in "${DMG_PATHS[@]}"; do
            xcrun stapler validate "$DMG_PATH"
          done

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Automated main release from \`${GITHUB_SHA}\`.

          - Version: \`${{ steps.version.outputs.app_version }}\`
          - Commit: \`${GITHUB_SHA}\`
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          if gh release view "${{ steps.version.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.version.outputs.release_tag }}" apps/desktop/dist-electron/*.dmg apps/desktop/dist-electron/*.zip apps/desktop/dist-electron/*.yml apps/desktop/dist-electron/*.blockmap --clobber
            gh release edit "${{ steps.version.outputs.release_tag }}" \
              --title "${{ steps.version.outputs.release_title }}" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "${{ steps.version.outputs.release_tag }}" \
              apps/desktop/dist-electron/*.dmg \
              apps/desktop/dist-electron/*.zip \
              apps/desktop/dist-electron/*.yml \
              apps/desktop/dist-electron/*.blockmap \
              --target "${GITHUB_SHA}" \
              --title "${{ steps.version.outputs.release_title }}" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
