appId: com.strapping.ai-canvas
productName: AI Canvas

directories:
  buildResources: build
  output: dist-electron

files:
  - out/**/*
  - package.json

artifactName: AI-Canvas-${version}-${arch}.${ext}

electronUpdaterCompatibility: '>=2.16'
forceCodeSigning: false
npmRebuild: false

publish:
  provider: github
  owner: chadnickbok
  repo: ai-canvas
  releaseType: release

mac:
  category: public.app-category.developer-tools
  forceCodeSigning: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icons/strapping-app-icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

linux:
  category: Graphics
  executableName: ai-canvas
  description: Local-first scene-first mockup editor desktop app.
  maintainer: Nick Chadwick
  synopsis: Local-first scene-first mockup editor.
  icon: build/icons/strapping-app-icon.png
  target:
    - target: deb
    - target: AppImage
  desktop:
    entry:
      Name: AI Canvas
      Comment: Local-first scene-first mockup editor
      Categories: Graphics;Development;
      StartupWMClass: ai-canvas
      Terminal: false

deb:
  packageCategory: graphics
  packageName: ai-canvas

win:
  icon: build/icons/strapping-app-icon.ico
  target:
    - target: nsis
      arch:
        - x64
  verifyUpdateCodeSignature: true

nsis:
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  oneClick: true
  perMachine: false
